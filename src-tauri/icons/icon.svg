<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="fromLeft" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="520" y2="0">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="fromTop" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="520">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="fromBottom" gradientUnits="userSpaceOnUse" x1="0" y1="1024" x2="0" y2="480">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="20" y="20" width="984" height="984" rx="180"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="20" y="20" width="984" height="984" rx="180" fill="#64B5F6"/>

    <!-- From left edge — upper area -->
    <rect x="-30" y="200" width="570" height="240" rx="24" fill="url(#fromLeft)"/>

    <!-- From top edge — right of center -->
    <rect x="560" y="-30" width="240" height="570" rx="24" fill="url(#fromTop)"/>

    <!-- From bottom edge — left of center -->
    <rect x="250" y="480" width="240" height="574" rx="24" fill="url(#fromBottom)"/>
  </g>
</svg>
